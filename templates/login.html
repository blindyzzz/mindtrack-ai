<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MindTrack AI | Login</title>
    <link rel="stylesheet" href="/static/styles.css" />
  </head>
  <body class="auth-body">
    <main class="auth-shell">
      <section class="auth-card">
        <p class="eyebrow">MindTrack AI</p>
        <h1>{title}</h1>
        <p class="intro">A calm space for student check-ins, daily support, and small next steps.</p>
        {error}
        <form method="post" action="/login" class="auth-form">
          <label>
            Email
            <input type="email" name="email" required />
          </label>
          <label>
            Password
            <input type="password" name="password" required />
          </label>
          <button type="submit">Log in</button>
        </form>
        <p class="switch-link">New here? <a href="/signup">Create an account</a></p>
        <p class="disclaimer">This app does not provide medical or psychological advice. It is for general support only.</p>
      </section>
    </main>
  </body>
</html>
